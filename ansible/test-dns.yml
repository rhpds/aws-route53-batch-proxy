---
# Test playbook for Route53 Batch Proxy
#
# Uses the standard amazon.aws.route53 module with endpoint_url pointed at
# the proxy — identical to how AgnosticD talks to Route53, just with the
# endpoint override added.
#
# Usage:
#   # Create records
#   ansible-playbook ansible/test-dns.yml -e env=dev -e dns_state=present \
#     -e guid=abc12 -e hosted_zone_id=Z009829317DQYBBJZ02ZU
#
#   # Delete records
#   ansible-playbook ansible/test-dns.yml -e env=dev -e dns_state=absent \
#     -e guid=abc12 -e hosted_zone_id=Z009829317DQYBBJZ02ZU
#
#   # Custom instances
#   ansible-playbook ansible/test-dns.yml -e env=dev -e dns_state=present \
#     -e guid=abc12 -e hosted_zone_id=Z009829317DQYBBJZ02ZU \
#     -e '{"instances":[{"name":"bastion","ip":"10.0.1.5"}]}'

- name: Route53 Batch Proxy DNS Test
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - amazon.aws

  vars_files:
    - "vars/{{ env }}.yml"

  vars:
    proxy_url: "https://{{ proxy_host }}"
    base_domain: "dynamic.redhatworkshops.io"
    dns_state: present
    dns_ttl: 300
    guid: ""
    hosted_zone_id: ""
    # Default test instances — override with -e instances='[...]'
    instances:
      - name: bastion
        ip: 10.0.1.5
      - name: master
        ip: 10.0.1.10
      - name: worker1
        ip: 10.0.1.11
    # Additional CNAME records (e.g. *.apps → master)
    cname_records:
      - name: "*.apps"
        target: "master"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - guid | length > 0
          - hosted_zone_id | length > 0
        fail_msg: "guid and hosted_zone_id are required"

  tasks:
    # --- A records ---
    - name: "DNS A records ({{ dns_state }})"
      amazon.aws.route53:
        state: "{{ dns_state }}"
        aws_access_key_id: "{{ aws_access_key_id }}"
        aws_secret_access_key: "{{ aws_secret_access_key }}"
        endpoint_url: "{{ proxy_url }}"
        validate_certs: false
        hosted_zone_id: "{{ hosted_zone_id }}"
        record: "{{ item.name }}.{{ guid }}.{{ base_domain }}"
        type: A
        ttl: "{{ dns_ttl }}"
        value: "{{ item.ip }}"
        overwrite: true
      loop: "{{ instances }}"
      loop_control:
        label: "{{ item.name }}.{{ guid }}.{{ base_domain }}"
      register: dns_a_results
      retries: 3
      delay: 5
      until: dns_a_results is succeeded
      tags: [dns, a-records]

    # --- CNAME records ---
    - name: "DNS CNAME records ({{ dns_state }})"
      amazon.aws.route53:
        state: "{{ dns_state }}"
        aws_access_key_id: "{{ aws_access_key_id }}"
        aws_secret_access_key: "{{ aws_secret_access_key }}"
        endpoint_url: "{{ proxy_url }}"
        validate_certs: false
        hosted_zone_id: "{{ hosted_zone_id }}"
        record: "{{ item.name }}.{{ guid }}.{{ base_domain }}"
        type: CNAME
        ttl: "{{ dns_ttl }}"
        value: "{{ item.target }}.{{ guid }}.{{ base_domain }}"
        overwrite: true
      loop: "{{ cname_records }}"
      loop_control:
        label: "{{ item.name }}.{{ guid }}.{{ base_domain }}"
      register: dns_cname_results
      retries: 3
      delay: 5
      until: dns_cname_results is succeeded
      when: cname_records | length > 0
      tags: [dns, cname-records]

    # --- Check proxy status ---
    - name: Check proxy queue status
      ansible.builtin.uri:
        url: "{{ proxy_url }}/status"
        method: GET
        validate_certs: false
      register: proxy_status
      tags: [always]

    - name: Report results
      ansible.builtin.debug:
        msg: |
          === DNS {{ dns_state | upper }} complete ===
          Zone:       {{ hosted_zone_id }}
          GUID:       {{ guid }}
          Domain:     {{ guid }}.{{ base_domain }}
          Records:    {{ instances | length }} A + {{ cname_records | length }} CNAME
          Proxy:      {{ proxy_url }}
          Queue:      {{ proxy_status.json }}
      tags: [always]
